<section

>
    <style>
        .player-market-chart--mbappe-content {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            position: relative !important;
            width: 100% !important;
            height: auto !important;
            max-height: none !important;
            overflow: visible !important;
            box-sizing: border-box !important;
            margin: 0 0 28px !important;
            padding: 20px !important;
            border: 1px solid rgba(212, 175, 55, 0.16);
            border-radius: 18px;
            background:
                linear-gradient(
                    145deg,
                    rgba(16, 21, 28, 0.98),
                    rgba(6, 9, 13, 0.98)
                );
            box-shadow:
                0 18px 42px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.035);
        }

        .player-market-chart--mbappe-content
        .player-market-chart__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;

        .player-market-chart--mbappe-content
        .player-market-chart__header > div {
            display: grid;
            gap: 5px;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__eyebrow {
            color: #aaa06f;
            font-size: 9px;
            font-weight: 950;
            line-height: 1.2;
            letter-spacing: 0.12em;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__current {
            color: #f1cf6b;
            font-size: 22px;
            font-weight: 950;
            line-height: 1;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__source {
            display: inline-flex;
            min-height: 26px;
            align-items: center;
            padding: 0 9px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 999px;
            color: #d9c36e;
            background: rgba(212, 175, 55, 0.07);
            font-size: 8px;
            font-weight: 900;
            text-decoration: none;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__canvas {
            width: 100%;
            height: 145px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.11);
            border-radius: 13px;
            background:
                radial-gradient(
                    circle at 50% 0,
                    rgba(212, 175, 55, 0.09),
                    transparent 58%
                ),
                rgba(5, 8, 11, 0.66);
        }

        .player-market-chart--mbappe-content
        .player-market-chart__canvas svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__grid {
            fill: none;
            stroke: rgba(255, 255, 255, 0.065);
            stroke-width: 1;
            vector-effect: non-scaling-stroke;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__line {
            fill: none;
            stroke: #e7c65b;
            stroke-width: 2.4;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter:
                drop-shadow(
                    0 0 5px rgba(231, 198, 91, 0.28)
                );
            vector-effect: non-scaling-stroke;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__dot {
            fill: #11161c;
            stroke: #f0d16d;
            stroke-width: 2.2;
            vector-effect: non-scaling-stroke;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__points {
            display: grid;
            grid-template-columns:
                repeat(
                    var(--market-point-count),
                    minmax(0, 1fr)
                );
            gap: 6px;
            margin-top: 10px;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__point {
            display: grid;
            min-width: 0;
            gap: 2px;
            text-align: center;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__point small {
            color: #737b85;
            font-size: 8px;
            font-weight: 850;
            white-space: nowrap;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__point strong {
            color: #d6dbe1;
            font-size: 9px;
            font-weight: 900;
            white-space: nowrap;
        }

        .player-market-chart--mbappe-content
        .player-market-chart__note {
            margin: 11px 0 0;
            color: #666e78;
            font-size: 8px;
            font-weight: 700;
            line-height: 1.4;
        }

            ></path>

            <circle
