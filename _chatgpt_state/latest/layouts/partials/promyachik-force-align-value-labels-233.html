<!-- PROMYACHIK 233 FORCE ALIGN VALUE LABELS TO POINTS START -->
<script>
(function () {
    if (window.__promyachikForceAlignValueLabels233Ready) {
        return;
    }

    window.__promyachikForceAlignValueLabels233Ready = true;

    const PRICE_RE = /€\s*\d+(?:[.,]\d+)?\s*(?:млн|m|м)?/i;
    const DATE_RE = /(янв|фев|мар|апр|май|июн|июл|авг|сен|сент|окт|ноя|дек|20\d{2})/i;
    const EXCLUDE_SELECTOR = [
        ".pf-ticker",
        ".bottom-transfer-strip-v3",
        ".pf-header",
        "header",
        "nav"
    ].join(",");

    function visible(el) {
        if (!el || !(el instanceof Element)) {
            return false;
        }

        const rect = el.getBoundingClientRect();
        const style = window.getComputedStyle(el);

        return (
            rect.width > 0 &&
            rect.height > 0 &&
            style.display !== "none" &&
            style.visibility !== "hidden"
        );
    }

    function text(el) {
        return (el.textContent || "").replace(/\s+/g, " ").trim();
    }

    function countPrices(value) {
        return (value.match(/€\s*\d+(?:[.,]\d+)?\s*(?:млн|m|м)?/gi) || []).length;
    }

    function isLabelItem(el) {
        if (!visible(el) || el.closest(EXCLUDE_SELECTOR)) {
            return false;
        }

        const value = text(el);

        if (value.length < 5 || value.length > 95) {
            return false;
        }

        return PRICE_RE.test(value) && DATE_RE.test(value) && countPrices(value) === 1;
    }

    function compactItems(items) {
        const out = [];

        items.forEach(function (item) {
            if (out.some(function (existing) {
                return existing.contains(item) || item.contains(existing);
            })) {
                return;
            }

            out.push(item);
        });

        return out;
    }

    function candidateRows() {
        const rows = [];

        Array.from(document.querySelectorAll("div, section, ul, ol")).forEach(function (parent) {
            if (!visible(parent) || parent.closest(EXCLUDE_SELECTOR)) {
                return;
            }

            const value = text(parent);
            const priceCount = countPrices(value);

            if (priceCount < 3 || priceCount > 8 || value.length > 1200) {
                return;
            }

            let items = Array.from(parent.children).filter(isLabelItem);

            if (items.length < 3) {
                items = compactItems(
                    Array.from(parent.querySelectorAll("div, span, li"))
                        .filter(isLabelItem)
                );
            }

            if (items.length < 3 || items.length > 8) {
                return;
            }

            const rect = parent.getBoundingClientRect();

            if (rect.width < 260 || rect.height > 170) {
                return;
            }

            const className = String(parent.className || "").toLowerCase();
            let score = 0;

            if (className.includes("chart")) {
                score += 100;
            }

            if (className.includes("value") || className.includes("market")) {
                score += 100;
            }

            if (parent.closest("[class*='chart'], [class*='market'], [class*='value']")) {
                score += 60;
            }

            score += items.length * 20;
            score -= rect.height;

            rows.push({
                parent: parent,
                items: items,
                score: score
            });
        });

        rows.sort(function (a, b) {
            return b.score - a.score;
        });

        const selected = [];

        rows.forEach(function (row) {
            if (selected.some(function (existing) {
                return existing.parent.contains(row.parent) || row.parent.contains(existing.parent);
            })) {
                return;
            }

            selected.push(row);
        });

        return selected.slice(0, 3);
    }

    function chartRootFor(row) {
        let node = row.parent;
        let best = row.parent;
        let guard = 0;

        while (node && node !== document.body && guard < 9) {
            const className = String(node.className || "").toLowerCase();
            const hasChartSignal =
                className.includes("chart") ||
                className.includes("market") ||
                className.includes("value") ||
                node.querySelector("svg");

            if (hasChartSignal && node.getBoundingClientRect().width >= row.parent.getBoundingClientRect().width) {
                best = node;
            }

            node = node.parentElement;
            guard += 1;
        }

        return best;
    }

    function sortedUnique(xs) {
        const sorted = xs
            .filter(function (x) { return Number.isFinite(x); })
            .sort(function (a, b) { return a - b; });

        const out = [];

        sorted.forEach(function (x) {
            if (!out.length || Math.abs(out[out.length - 1] - x) > 10) {
                out.push(x);
            }
        });

        return out;
    }

    function xsFromSvgCircles(root, rowRect) {
        const xs = [];

        root.querySelectorAll("svg circle").forEach(function (circle) {
            if (!visible(circle)) {
                return;
            }

            const rect = circle.getBoundingClientRect();

            if (rect.width > 34 || rect.height > 34) {
                return;
            }

            if (rect.bottom > rowRect.top + 10) {
                return;
            }

            xs.push(rect.left + rect.width / 2);
        });

        return sortedUnique(xs);
    }

    function xsFromSvgViewBox(root, count) {
        const svg = root.querySelector("svg");

        if (!svg) {
            return [];
        }

        const rect = svg.getBoundingClientRect();

        if (!rect.width) {
            return [];
        }

        let vbWidth = 980;
        const viewBox = svg.getAttribute("viewBox");

        if (viewBox) {
            const parts = viewBox.trim().split(/\s+/).map(Number);

            if (parts.length === 4 && Number.isFinite(parts[2]) && parts[2] > 0) {
                vbWidth = parts[2];
            }
        }

        /*
           Старый Hugo-график строит точки так:
           chartWidth 980, leftPad 48, rightPad 48.
           Значит подписи должны стоять по этим же X-координатам.
        */
        const leftPad = 48;
        const rightPad = 48;
        const inner = vbWidth - leftPad - rightPad;

        if (count <= 1) {
            return [rect.left + rect.width / 2];
        }

        return Array.from({ length: count }, function (_, index) {
            const svgX = leftPad + inner * index / (count - 1);
            return rect.left + rect.width * (svgX / vbWidth);
        });
    }

    function xsFromHtmlPoints(root, rowRect) {
        const xs = [];

        root.querySelectorAll("[class*='point'], [class*='dot'], [class*='marker'], [class*='node']").forEach(function (node) {
            if (!visible(node) || node.closest(EXCLUDE_SELECTOR)) {
                return;
            }

            const rect = node.getBoundingClientRect();

            if (
                rect.width < 5 ||
                rect.height < 5 ||
                rect.width > 70 ||
                rect.height > 70 ||
                rect.bottom > rowRect.top + 10
            ) {
                return;
            }

            xs.push(rect.left + rect.width / 2);
        });

        return sortedUnique(xs);
    }

    function fallbackXs(rowRect, count) {
        /*
           Последний безопасный вариант — те же пропорции, что у графика:
           слева 48/980, справа 48/980.
        */
        const leftPad = rowRect.width * 48 / 980;
        const rightPad = rowRect.width * 48 / 980;
        const start = rowRect.left + leftPad;
        const end = rowRect.right - rightPad;

        if (count <= 1) {
            return [rowRect.left + rowRect.width / 2];
        }

        return Array.from({ length: count }, function (_, index) {
            return start + (end - start) * index / (count - 1);
        });
    }

    function align(row) {
        const parent = row.parent;
        const items = row.items;
        const root = chartRootFor(row);
        const rowRectBefore = parent.getBoundingClientRect();

        let xs = xsFromSvgCircles(root, rowRectBefore);

        if (xs.length !== items.length) {
            xs = xsFromSvgViewBox(root, items.length);
        }

        if (xs.length !== items.length) {
            xs = xsFromHtmlPoints(root, rowRectBefore);
        }

        if (xs.length !== items.length) {
            xs = fallbackXs(rowRectBefore, items.length);
        }

        parent.classList.add("promyachik-value-label-row-233");

        const currentHeight = Math.max(parent.getBoundingClientRect().height, 42);

        parent.style.position = "relative";
        parent.style.display = "block";
        parent.style.width = "100%";
        parent.style.maxWidth = "100%";
        parent.style.minHeight = currentHeight + "px";
        parent.style.height = currentHeight + "px";
        parent.style.overflow = "visible";

        const rowRectAfter = parent.getBoundingClientRect();

        items.forEach(function (item, index) {
            const x = xs[index] - rowRectAfter.left;

            item.classList.add("promyachik-value-label-item-233");
            item.style.position = "absolute";
            item.style.left = x + "px";
            item.style.top = "0";
            item.style.transform = "translateX(-50%)";
            item.style.minWidth = "72px";
            item.style.maxWidth = "112px";
            item.style.textAlign = "center";
            item.style.whiteSpace = "nowrap";
        });

        return {
            count: items.length,
            xs: xs.map(function (x) { return Math.round(x); })
        };
    }

    function runAlign() {
        const rows = candidateRows();
        const result = [];

        rows.forEach(function (row) {
            result.push(align(row));
        });

        document.documentElement.dataset.promyachikValueLabels233 = String(result.length);
    }

    function boot() {
        runAlign();

        window.setTimeout(runAlign, 120);
        window.setTimeout(runAlign, 450);
        window.setTimeout(runAlign, 1000);
        window.setTimeout(runAlign, 1800);

        window.addEventListener("resize", function () {
            window.requestAnimationFrame(runAlign);
        });
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
    } else {
        boot();
    }
})();
</script>
<!-- PROMYACHIK 233 FORCE ALIGN VALUE LABELS TO POINTS END -->
{{ end }}
