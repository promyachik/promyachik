{{ $transparentCard := "css/profutbik-mbappe-elite-transparent.png" | relURL }}

<div class="value-dashboard">

            <div class="player-mini-card">

                <img

                Текущая стоимость

        </div>

            <span class="value-summary-label">
                За последнее изменение
            </span>

            <strong class="value-change value-change--up">

                <span class="value-change-arrow">
                    ↑

                    +9.1%
